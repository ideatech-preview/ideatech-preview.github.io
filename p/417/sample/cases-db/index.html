  (function () {
    const payloadEl = document.getElementById('cdb-payload');
    if (!payloadEl) return;
    const payload = JSON.parse(payloadEl.textContent);

    const SESSION_KEY = 'cdb-pw';

    const gate = document.getElementById('cdb-gate');
    const form = document.getElementById('cdb-form');
    const pwInput = document.getElementById('cdb-pw');
    const errEl = document.getElementById('cdb-error');
    const app = document.getElementById('cdb-app');

    function b64ToBytes(s) { return Uint8Array.from(atob(s), function (c) { return c.charCodeAt(0); }); }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function formatDate(d) {
      const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? m[1] + '.' + m[2] + '.' + m[3] : d;
    }

    async function deriveKey(password, salt, iterations) {
      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );
    }

    async function tryDecrypt(password) {
      const salt = b64ToBytes(payload.salt);
      const iv = b64ToBytes(payload.iv);
      const ct = b64ToBytes(payload.ciphertext);
      const key = await deriveKey(password, salt, payload.iterations);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
      return JSON.parse(new TextDecoder().decode(pt));
    }

    let allCases = [];
    const state = {
      industry: new Set(),
      service: new Set(),
      tag: new Set(),
      year: new Set(),
      q: '',
      sort: 'date-desc',
    };

    function unique(arr) { return Array.from(new Set(arr)); }

    function buildPills(containerId, values, type) {
      const c = document.getElementById(containerId);
      c.innerHTML = '';

      // 「すべて」ピル
      const allPill = document.createElement('button');
      allPill.type = 'button';
      allPill.className = 'cdb-tagpill is-active';
      allPill.innerHTML =
        '<span class="cdb-tagpill__name">すべて</span>' +
        '<span class="cdb-tagpill__count">' + allCases.length + '</span>';
      allPill.addEventListener('click', function () {
        state[type].clear();
        c.querySelectorAll('.cdb-tagpill').forEach(function (el) { el.classList.remove('is-active'); });
        allPill.classList.add('is-active');
        render();
      });
      c.appendChild(allPill);

      for (const v of values) {
        // この値を持つ件数
        const count = allCases.filter(function (cs) {
          if (type === 'industry') return cs.industry === v;
          if (type === 'service') return cs.services.indexOf(v) >= 0;
          if (type === 'tag') return cs.tags.indexOf(v) >= 0;
          if (type === 'year') return cs.publishDate.slice(0, 4) === v;
          return false;
        }).length;

        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'cdb-tagpill';
        pill.innerHTML =
          '<span class="cdb-tagpill__name">' + escapeHtml(v) + '</span>' +
          '<span class="cdb-tagpill__count">' + count + '</span>';
        pill.addEventListener('click', function () {
          if (state[type].has(v)) {
            state[type].delete(v);
            pill.classList.remove('is-active');
          } else {
            state[type].add(v);
            pill.classList.add('is-active');
          }
          // 「すべて」状態の同期
          if (state[type].size === 0) allPill.classList.add('is-active');
          else allPill.classList.remove('is-active');
          render();
        });
        c.appendChild(pill);
      }
    }

    function matches(c) {
      if (state.industry.size && !state.industry.has(c.industry)) return false;
      if (state.service.size && !c.services.some(function (s) { return state.service.has(s); })) return false;
      if (state.tag.size && !c.tags.some(function (t) { return state.tag.has(t); })) return false;
      if (state.year.size) {
        const y = c.publishDate.slice(0, 4);
        if (!state.year.has(y)) return false;
      }
      if (state.q) {
        const q = state.q.toLowerCase();
        const hay = [c.company, c.summary, c.comment, c.industry]
          .concat(c.tags, c.services).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    }

    let currentView = 'grid';

    function renderCard(c) {
      return '<article class="cdb-card-wrap">' +
        '<a href="/p/417/sample/cases-db/' + encodeURIComponent(c.slug) + '/" class="cdb-card" data-slug="' + escapeHtml(c.slug) + '">' +
          '<div class="cdb-card__cover cdb-card__cover--brand">' +
            '<span class="cdb-card__industry">' + escapeHtml(c.industry) + '</span>' +
          '</div>' +
          '<div class="cdb-card__body">' +
            '<time class="cdb-card__date">' + formatDate(c.publishDate) + '</time>' +
            '<div class="cdb-card__tags">' +
              c.services.map(function (s) {
                return '<span class="cdb-card__tag">' + escapeHtml(s) + '</span>';
              }).join('') +
            '</div>' +
            '<h2 class="cdb-card__title">' + escapeHtml(c.company) + '</h2>' +
            '<p class="cdb-card__summary">' + escapeHtml(c.summary) + '</p>' +
            '<div class="cdb-card__hashtags">' +
              c.tags.map(function (t) {
                return '<span class="cdb-card__hashtag">#' + escapeHtml(t) + '</span>';
              }).join('') +
            '</div>' +
            '<div class="cdb-card__comment">' +
              '<span class="cdb-card__comment-label">IDEATECHコメント</span>' +
              escapeHtml(c.comment) +
            '</div>' +
            '<span class="cdb-card__link">詳細を見る</span>' +
          '</div>' +
        '</a>' +
      '</article>';
    }

    function renderRow(c) {
      return '<a href="/p/417/sample/cases-db/' + encodeURIComponent(c.slug) + '/" class="cdb-row" data-slug="' + escapeHtml(c.slug) + '">' +
        '<div class="cdb-row__industry"><span>' + escapeHtml(c.industry) + '</span></div>' +
        '<div class="cdb-row__main">' +
          '<h3 class="cdb-row__company">' + escapeHtml(c.company) + '</h3>' +
          '<p class="cdb-row__summary">' + escapeHtml(c.summary) + '</p>' +
        '</div>' +
        '<div class="cdb-row__services">' +
          c.services.map(function (s) {
            return '<span class="cdb-row__service">' + escapeHtml(s) + '</span>';
          }).join('') +
        '</div>' +
        '<div class="cdb-row__tags">' +
          c.tags.map(function (t) {
            return '<span class="cdb-row__tag">#' + escapeHtml(t) + '</span>';
          }).join('') +
        '</div>' +
        '<time class="cdb-row__date">' + formatDate(c.publishDate) + '</time>' +
        '<div class="cdb-row__comment">' + escapeHtml(c.comment) + '</div>' +
      '</a>';
    }

    function sortCases(arr) {
      const sorted = arr.slice();
      switch (state.sort) {
        case 'date-asc':
          sorted.sort(function (a, b) { return a.publishDate.localeCompare(b.publishDate); });
          break;
        case 'industry-asc':
          sorted.sort(function (a, b) { return a.industry.localeCompare(b.industry, 'ja'); });
          break;
        case 'company-asc':
          sorted.sort(function (a, b) { return a.company.localeCompare(b.company, 'ja'); });
          break;
        case 'date-desc':
        default:
          sorted.sort(function (a, b) { return b.publishDate.localeCompare(a.publishDate); });
          break;
      }
      return sorted;
    }

    function render() {
      const filtered = sortCases(allCases.filter(matches));
      document.getElementById('cdb-count').textContent =
        filtered.length + ' 件 / ' + allCases.length + ' 件';
      const results = document.getElementById('cdb-results');
      const empty = document.getElementById('cdb-empty');
      results.className = 'cdb-results cdb-results--' + currentView;
      empty.hidden = filtered.length > 0;

      if (currentView === 'list') {
        let html = '<div class="cdb-row cdb-row--head">' +
          '<div class="cdb-row__industry">業種</div>' +
          '<div class="cdb-row__main">社名・概要</div>' +
          '<div class="cdb-row__services">導入サービス</div>' +
          '<div class="cdb-row__tags">タグ</div>' +
          '<div class="cdb-row__date">公開日</div>' +
          '<div class="cdb-row__comment">IDEATECHコメント</div>' +
        '</div>';
        for (const c of filtered) html += renderRow(c);
        results.innerHTML = html;
      } else {
        let html = '';
        for (const c of filtered) html += renderCard(c);
        results.innerHTML = html;
      }

    }

    // ビュー切り替え
    document.querySelectorAll('.cdb-viewtoggle__btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        currentView = btn.dataset.view;
        document.querySelectorAll('.cdb-viewtoggle__btn').forEach(function (b) {
          b.classList.toggle('is-active', b === btn);
        });
        render();
      });
    });

    document.getElementById('cdb-search').addEventListener('input', function (e) {
      state.q = e.target.value.trim();
      render();
    });
    document.getElementById('cdb-sort-select').addEventListener('change', function (e) {
      state.sort = e.target.value;
      render();
    });
    document.getElementById('cdb-clear').addEventListener('click', function () {
      state.industry.clear();
      state.service.clear();
      state.tag.clear();
      state.year.clear();
      state.q = '';
      document.getElementById('cdb-search').value = '';
      document.querySelectorAll('.cdb-tagpill').forEach(function (el) { el.classList.remove('is-active'); });
      // 各グループの「すべて」を active に
      document.querySelectorAll('.cdb-tagpill-wrap').forEach(function (wrap) {
        const first = wrap.querySelector('.cdb-tagpill');
        if (first) first.classList.add('is-active');
      });
      render();
    });

    function initAfterUnlock(cases) {
      allCases = cases;
      buildPills('cdb-filter-industry', unique(allCases.map(function (c) { return c.industry; })).sort(), 'industry');
      buildPills('cdb-filter-service', unique(allCases.flatMap(function (c) { return c.services; })).sort(), 'service');
      buildPills('cdb-filter-tag', unique(allCases.flatMap(function (c) { return c.tags; })).sort(), 'tag');
      buildPills('cdb-filter-year', unique(allCases.map(function (c) { return c.publishDate.slice(0, 4); })).sort().reverse(), 'year');
      render();
      gate.hidden = true;
      app.hidden = false;
    }

    // セッション内の再認証スキップ
    const saved = sessionStorage.getItem(SESSION_KEY);
    if (saved) {
      tryDecrypt(saved)
        .then(initAfterUnlock)
        .catch(function () { sessionStorage.removeItem(SESSION_KEY); });
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errEl.hidden = true;
