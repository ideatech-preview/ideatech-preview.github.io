<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <clipPath id="cardClip">
      <rect width="800" height="600" rx="12"/>
    </clipPath>
  </defs>

  <!-- カード背景 -->
  <g clip-path="url(#cardClip)">
    <rect width="800" height="600" fill="#FFFFFF"/>

    <!-- タイトルエリア（ダークブルー背景・上部のみ角丸） -->
    <rect width="800" height="80" fill="#1B4FA0"/>
  </g>

  <!-- カード外枠 -->
  <rect x="0.5" y="0.5" width="799" height="599" rx="12" fill="none" stroke="#E0E0E0" stroke-width="1"/>

  <!-- タイトルテキスト（2行・中央揃え） -->
  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">あなたが企業でウェビナーを実施する際に、</text>
  <text x="400" y="60" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">課題と感じることがあれば教えてください（複数回答）</text>

  <!-- ===== グラフエリア ===== -->

  <!-- Row 0: テーマ・内容 47.0% (blue) -->
