  <rect x="170" y="263" width="144.0" height="28" fill="#4A7FC1" rx="4"/>
  <text x="302" y="277" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">30.0%</text>

  <!-- Row 5: コスト 21.0% (yellow) -->
  <text x="158" y="319" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">コスト</text>
  <rect x="170" y="305" width="100.8" height="28" fill="#F0C040" rx="4"/>
  <text x="279" y="319" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">21.0%</text>

  <!-- Row 6: 人員不足 15.0% (yellow) -->
  <text x="158" y="361" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">人員不足</text>
  <rect x="170" y="347" width="72.0" height="28" fill="#F0C040" rx="4"/>
  <text x="250" y="361" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">15.0%</text>

  <!-- Row 7: 配信環境の準備 14.0% (yellow) -->
  <text x="158" y="403" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">配信環境の準備</text>
  <rect x="170" y="389" width="67.2" height="28" fill="#F0C040" rx="4"/>
  <text x="245" y="403" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">14.0%</text>

  <!-- Row 8: 配信ツールの選定 7.0% (yellow) -->
  <text x="158" y="445" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">配信ツールの選定</text>
  <rect x="170" y="431" width="33.6" height="28" fill="#F0C040" rx="4"/>
  <text x="212" y="445" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">7.0%</text>

  <!-- Row 9: その他 0.0% (none) -->
  <text x="158" y="487" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#999999">その他</text>
  <text x="178" y="487" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#999999">0.0%</text>

  <!-- Row 10: 特にない 9.0% (gray) -->
  <text x="158" y="529" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">特にない</text>
  <rect x="170" y="515" width="43.2" height="28" fill="#B0B0B0" rx="4"/>
  <text x="221" y="529" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#333333">9.0%</text>

  <!-- フッター -->
  <text x="30" y="560" text-anchor="start" font-family="sans-serif" font-size="11" fill="#999999">株式会社IDEATECH｜BtoB企業のウェビナーに関する意識調査｜n=100</text>

