  <rect x="170" y="95" width="225.6" height="28" fill="#4A7FC1" rx="4"/>
  <text x="384" y="109" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">47.0%</text>

  <!-- Row 1: 告知・集客 36.0% (blue) -->
