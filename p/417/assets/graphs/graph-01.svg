  <rect x="170" y="179" width="172.8" height="28" fill="#4A7FC1" rx="4"/>
  <text x="331" y="193" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">36.0%</text>

  <!-- Row 3: リード獲得 31.0% (blue) -->
  <text x="158" y="235" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1B4FA0">リード獲得</text>
  <rect x="170" y="221" width="148.8" height="28" fill="#4A7FC1" rx="4"/>
  <text x="307" y="235" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">31.0%</text>

  <!-- Row 4: 効果測定 30.0% (blue) -->
