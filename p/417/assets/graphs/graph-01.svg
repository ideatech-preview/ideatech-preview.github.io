  <rect x="170" y="137" width="172.8" height="28" fill="#4A7FC1" rx="4"/>
  <text x="331" y="151" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">36.0%</text>

  <!-- Row 2: 参加率 36.0% (blue) -->
